<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>StreamVault | Watch Anywhere</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a0f;
    --bg-card: #14141f;
    --bg-elevated: #1c1c2a;
    --border: #2a2a38;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b8;
    --accent: #e50914;
    --accent-hover: #b81d24;
  }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
    backdrop-filter: blur(10px);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    font-weight: 600;
  }

  .nav-link {
    cursor: pointer;
    transition: 0.2s;
    color: var(--text-secondary);
  }

  .nav-link.active, .nav-link:hover {
    color: var(--accent);
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border-radius: 40px;
    padding: 8px 18px;
    gap: 10px;
    border: 1px solid transparent;
    transition: 0.2s;
  }

  .search-bar:focus-within {
    border-color: var(--accent);
    background: rgba(0,0,0,0.7);
  }

  .search-bar input {
    background: transparent;
    border: none;
    color: white;
    font-size: 14px;
    width: 220px;
    outline: none;
  }

  .genre-filter {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 20px 40px 0 40px;
    margin-bottom: 20px;
    scrollbar-width: thin;
  }

  .genre-chip {
    background: rgba(255,255,255,0.05);
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.2s;
    border: 1px solid transparent;
  }

  .genre-chip:hover, .genre-chip.active {
    background: var(--accent);
    color: white;
  }

  main {
    padding: 0 40px 60px 40px;
  }

  /* Hero Banner */
  .hero-banner {
    height: 560px;
    border-radius: 24px;
    margin-bottom: 40px;
    background-size: cover;
    background-position: center 20%;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 60px;
    box-shadow: inset 0 -150px 80px -30px rgba(0,0,0,0.9);
  }

  .hero-content {
    max-width: 550px;
    z-index: 2;
  }

  .hero-title {
    font-size: 52px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .hero-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #ddd;
  }

  .match {
    color: #46d369;
    font-weight: bold;
  }

  .hero-desc {
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 24px;
    color: #ddd;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
  }

  .btn-play, .btn-add {
    padding: 10px 28px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    border: none;
    transition: 0.2s;
  }

  .btn-play {
    background: white;
    color: black;
  }

  .btn-play:hover {
    background: #e6e6e6;
  }

  .btn-add {
    background: rgba(109, 109, 110, 0.7);
    color: white;
  }

  /* Sections */
  .section {
    margin-top: 48px;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 24px;
    font-weight: 700;
  }

  .scroll-x {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 16px;
    scrollbar-width: thin;
  }

  .movie-card {
    flex: 0 0 180px;
    cursor: pointer;
    transition: transform 0.25s;
    border-radius: 12px;
    overflow: hidden;
  }

  .movie-card:hover {
    transform: scale(1.05);
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 12px;
    background: var(--bg-card);
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin-top: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(16px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 40px;
    overflow-y: auto;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-container {
    max-width: 950px;
    width: 100%;
    background: var(--bg-elevated);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp 0.3s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-banner {
    height: 380px;
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .modal-banner-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(to top, var(--bg-elevated), transparent);
  }

  .modal-content {
    padding: 24px 32px 32px;
  }

  .modal-title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .modal-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .modal-rating {
    color: #ffcd4a;
  }

  .modal-buttons {
    display: flex;
    gap: 16px;
    margin: 20px 0;
  }

  .modal-desc {
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
    background: rgba(0,0,0,0.3);
    padding: 16px;
    border-radius: 12px;
  }

  .modal-info-item strong {
    color: var(--accent);
    font-size: 12px;
    display: block;
  }

  .actors-list {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .actor-chip {
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .actor-chip:hover {
    background: var(--accent);
  }

  .seasons-select {
    background: var(--bg-card);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: white;
    margin: 16px 0;
    width: 200px;
  }

  .episodes-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 300px;
    overflow-y: auto;
  }

  .episode-item {
    display: flex;
    gap: 16px;
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .episode-item:hover {
    background: rgba(229,9,20,0.2);
    transform: translateX(6px);
  }

  .episode-img {
    width: 140px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 30px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    z-index: 10;
  }

  /* Player */
  .player-full {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 2000;
    display: none;
    flex-direction: column;
  }

  .player-full.active {
    display: flex;
  }

  .player-header-nav {
    padding: 20px;
    background: linear-gradient(to bottom, black, transparent);
    z-index: 10;
  }

  .player-back {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
  }

  .player-frame {
    flex: 1;
    width: 100%;
    border: none;
  }

  .spinner {
    text-align: center;
    padding: 60px;
    display: none;
  }

  .spinner.active {
    display: block;
  }

  .spinner::after {
    content: '';
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 80px;
    color: var(--text-secondary);
  }

  @media (max-width: 768px) {
    .header { padding: 12px 20px; }
    main { padding: 0 16px 40px; }
    .hero-banner { height: 420px; padding: 30px; }
    .hero-title { font-size: 32px; }
    .movie-card { flex: 0 0 140px; }
    .modal-container { max-width: 95%; }
    .modal-banner { height: 240px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">STREAMVAULT</div>
  <div class="nav-links">
    <span class="nav-link active" data-category="movie">Movies</span>
    <span class="nav-link" data-category="tv">TV Shows</span>
    <span class="nav-link" data-category="continue">Continue Watching</span>
    <span class="nav-link" data-category="watchlist">My List</span>
  </div>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies or TV shows...">
  </div>
</div>

<div class="genre-filter" id="genreFilter"></div>

<main>
  <div id="heroBanner" class="hero-banner" style="display: none;"></div>
  <div id="contentSections"></div>
  <div id="spinner" class="spinner"></div>
</main>

<!-- Modal -->
<div id="detailModal" class="modal-overlay">
  <div class="modal-container">
    <button class="close-modal" id="closeModalBtn">✕</button>
    <div id="modalBanner" class="modal-banner"></div>
    <div class="modal-content">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalStats" class="modal-stats"></div>
      <div class="modal-buttons">
        <button id="modalPlayBtn" class="btn-play">▶ Play</button>
        <button id="modalSaveBtn" class="btn-add">+ My List</button>
      </div>
      <div id="modalDesc" class="modal-desc"></div>
      <div id="modalInfoGrid" class="modal-info-grid"></div>
      <div id="seasonsEpisodesContainer"></div>
    </div>
  </div>
</div>

<!-- Player -->
<div id="playerOverlay" class="player-full">
  <div class="player-header-nav">
    <button id="exitPlayerBtn" class="player-back">← Back to Browse</button>
  </div>
  <iframe id="playerFrame" class="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
  // TMDB API Configuration
  const TMDB_API = 'https://api.themoviedb.org/3';
  const TMDB_KEY = '8f8c7b0e8aefce789115fc66fd672df1';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  const BACKDROP_BASE = 'https://image.tmdb.org/t/p/original';
  const VIDAPI_MOVIE = 'https://vidapi.qzz.io/movie/';
  const VIDAPI_TV = 'https://vidapi.qzz.io/tv/';

  // App State
  let currentCategory = 'movie';
  let searchQuery = '';
  let selectedGenre = '';
  let moviesList = [];
  let tvList = [];
  let watchlist = JSON.parse(localStorage.getItem('sv_watchlist') || '[]');
  let continueWatching = JSON.parse(localStorage.getItem('sv_continue') || '[]');
  let currentModalData = null;

  const genres = ['Action', 'Adventure', 'Animation', 'Comedy', 'Crime', 'Documentary', 'Drama', 'Family', 'Fantasy', 'Horror', 'Romance', 'Sci-Fi', 'Thriller'];
  const genreIds = { 'Action': 28, 'Adventure': 12, 'Animation': 16, 'Comedy': 35, 'Crime': 80, 'Documentary': 99, 'Drama': 18, 'Family': 10751, 'Fantasy': 14, 'Horror': 27, 'Romance': 10749, 'Sci-Fi': 878, 'Thriller': 53 };

  async function fetchTMDB(endpoint) {
    const res = await fetch(`${TMDB_API}${endpoint}?api_key=${TMDB_KEY}`);
    if (!res.ok) throw new Error('TMDB error');
    return res.json();
  }

  async function loadInitialData() {
    document.getElementById('spinner').classList.add('active');
    try {
      const moviesRes = await fetchTMDB('/movie/popular?page=1');
      const tvRes = await fetchTMDB('/tv/popular?page=1');
      moviesList = moviesRes.results.slice(0, 30);
      tvList = tvRes.results.slice(0, 30);
      renderHero(moviesList[0]);
      renderSections();
      renderGenreFilters();
    } catch (e) {
      console.error(e);
      document.getElementById('contentSections').innerHTML = '<div class="empty-state">⚠️ Error loading content. Please check your connection.</div>';
    }
    document.getElementById('spinner').classList.remove('active');
  }

  async function searchContent(query) {
    if (!query) return loadInitialData();
    document.getElementById('spinner').classList.add('active');
    try {
      const movieSearch = await fetch(`${TMDB_API}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`);
      const tvSearch = await fetch(`${TMDB_API}/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`);
      const movieData = await movieSearch.json();
      const tvData = await tvSearch.json();
      moviesList = movieData.results.slice(0, 30);
      tvList = tvData.results.slice(0, 30);
      document.getElementById('heroBanner').style.display = 'none';
      renderSections();
    } catch (e) { console.error(e); }
    document.getElementById('spinner').classList.remove('active');
  }

  function renderHero(movie) {
    if (!movie || currentCategory !== 'movie' || searchQuery) {
      document.getElementById('heroBanner').style.display = 'none';
      return;
    }
    const heroDiv = document.getElementById('heroBanner');
    heroDiv.style.display = 'flex';
    heroDiv.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.4)), url(${BACKDROP_BASE}${movie.backdrop_path || movie.poster_path})`;
    heroDiv.innerHTML = `
      <div class="hero-content">
        <div class="hero-title">${movie.title || movie.name}</div>
        <div class="hero-meta"><span class="match">${Math.round(movie.vote_average * 10)}% Match</span> <span>${(movie.release_date || movie.first_air_date || '').slice(0,4)}</span></div>
        <div class="hero-desc">${movie.overview?.substring(0, 180) || 'No description available.'}</div>
        <div class="hero-buttons">
          <button class="btn-play" data-id="${movie.id}" data-type="movie" data-title="${movie.title}">▶ Play</button>
          <button class="btn-add" data-id="${movie.id}" data-title="${movie.title}" data-poster="${IMG_BASE}${movie.poster_path}" data-year="${(movie.release_date || '').slice(0,4)}">+ My List</button>
        </div>
      </div>
    `;
    document.querySelector('.hero-buttons .btn-play')?.addEventListener('click', () => playNow(movie.id, 'movie', movie.title));
    document.querySelector('.hero-buttons .btn-add')?.addEventListener('click', (e) => {
      const btn = e.target;
      toggleWatchlist(btn.dataset.id, btn.dataset.title, btn.dataset.poster, btn.dataset.year, 'movie');
    });
  }

  function renderSections() {
    const container = document.getElementById('contentSections');
    container.innerHTML = '';

    if (currentCategory === 'continue') {
      renderContinueWatching(container);
      return;
    }
    if (currentCategory === 'watchlist') {
      renderWatchlist(container);
      return;
    }

    let items = currentCategory === 'movie' ? moviesList : tvList;
    if (searchQuery) {
      items = items.filter(i => (i.title || i.name || '').toLowerCase().includes(searchQuery.toLowerCase()));
    }
    if (selectedGenre && selectedGenre !== 'All') {
      items = items.filter(i => i.genre_ids?.includes(genreIds[selectedGenre]));
    }

    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state">🎬 No results found. Try a different search!</div>';
      return;
    }

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-header"><h2 class="section-title">${currentCategory === 'movie' ? 'Popular Movies' : 'Popular TV Shows'}</h2></div><div class="scroll-x" id="scrollGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#scrollGrid');
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `
        <img class="card-poster" src="${IMG_BASE}${item.poster_path || ''}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
        <div class="card-title">${item.title || item.name}</div>
      `;
      card.addEventListener('click', () => showModal(item.id, currentCategory === 'movie' ? 'movie' : 'tv'));
      grid.appendChild(card);
    });
  }

  function renderContinueWatching(container) {
    if (!continueWatching.length) {
      container.innerHTML = '<div class="empty-state">🎬 No continue watching history. Start watching something!</div>';
      return;
    }
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<h2 class="section-title">Continue Watching</h2><div class="scroll-x" id="continueGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#continueGrid');
    continueWatching.forEach(item => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `<img class="card-poster" src="${item.poster}" loading="lazy"><div class="card-title">${item.title}</div><div style="font-size:12px;color:#46d369;">${Math.floor(item.progress/60)} min watched</div>`;
      card.addEventListener('click', () => {
        if (item.type === 'movie') playNow(item.id, 'movie', item.title);
        else playNow(item.id, 'tv', item.title, item.season || 1, item.episode || 1);
      });
      grid.appendChild(card);
    });
  }

  function renderWatchlist(container) {
    if (!watchlist.length) {
      container.innerHTML = '<div class="empty-state">📋 Your watchlist is empty. Add movies and shows you love!</div>';
      return;
    }
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<h2 class="section-title">My List</h2><div class="scroll-x" id="watchlistGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#watchlistGrid');
    watchlist.forEach(item => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `<img class="card-poster" src="${item.poster}" loading="lazy"><div class="card-title">${item.title}</div>`;
      card.addEventListener('click', () => showModal(item.id, item.type));
      grid.appendChild(card);
    });
  }

  function renderGenreFilters() {
    const container = document.getElementById('genreFilter');
    container.innerHTML = '<div class="genre-chip" data-genre="All">All</div>';
    genres.forEach(g => {
      const chip = document.createElement('div');
      chip.className = `genre-chip ${selectedGenre === g ? 'active' : ''}`;
      chip.innerText = g;
      chip.dataset.genre = g;
      chip.addEventListener('click', () => {
        selectedGenre = selectedGenre === g ? '' : g;
        renderSections();
        renderGenreFilters();
      });
      container.appendChild(chip);
    });
  }

  async function showModal(id, type) {
    const modal = document.getElementById('detailModal');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    try {
      const endpoint = type === 'movie' ? `/movie/${id}` : `/tv/${id}`;
      const data = await fetchTMDB(endpoint);
      const credits = await fetchTMDB(`${endpoint}/credits`);
      currentModalData = { ...data, type, id };
      
      document.getElementById('modalBanner').style.backgroundImage = `url(${BACKDROP_BASE}${data.backdrop_path || data.poster_path})`;
      document.getElementById('modalTitle').innerText = data.title || data.name;
      document.getElementById('modalStats').innerHTML = `${(data.release_date || data.first_air_date || '').slice(0,4)} • ${data.runtime || ''} min • <span class="modal-rating">⭐ ${data.vote_average?.toFixed(1)}/10</span>`;
      document.getElementById('modalDesc').innerText = data.overview || 'No description available.';
      
      let actorsHtml = '<div class="modal-info-item"><strong>Cast</strong><div class="actors-list">';
      (credits.cast || []).slice(0,8).forEach(actor => {
        actorsHtml += `<span class="actor-chip" data-name="${actor.name}" data-char="${actor.character}" data-img="${IMG_BASE}${actor.profile_path}">${actor.name}</span>`;
      });
      actorsHtml += '</div></div>';
      
      let directors = (credits.crew || []).filter(c => c.job === 'Director').map(d => d.name).join(', ') || 'N/A';
      let genresList = (data.genres || []).map(g => g.name).join(', ');
      
      document.getElementById('modalInfoGrid').innerHTML = `
        ${actorsHtml}
        <div class="modal-info-item"><strong>Directors</strong> ${directors}</div>
        <div class="modal-info-item"><strong>Genres</strong> ${genresList}</div>
        <div class="modal-info-item"><strong>Runtime</strong> ${data.runtime || 'N/A'} min</div>
      `;
      
      document.querySelectorAll('.actor-chip').forEach(el => {
        el.addEventListener('click', () => {
          alert(`🎭 ${el.dataset.name}\nRole: ${el.dataset.char || 'Actor'}\n\nMore movies by this actor coming soon!`);
        });
      });
      
      const seasonsContainer = document.getElementById('seasonsEpisodesContainer');
      if (type === 'tv' && data.seasons) {
        const validSeasons = data.seasons.filter(s => s.season_number > 0);
        if (validSeasons.length) {
          seasonsContainer.innerHTML = `<select id="seasonSelect" class="seasons-select"></select><div id="episodesList" class="episodes-list"></div>`;
          const select = document.getElementById('seasonSelect');
          validSeasons.forEach(s => {
            select.innerHTML += `<option value="${s.season_number}">Season ${s.season_number} (${s.episode_count} episodes)</option>`;
          });
          select.onchange = () => loadEpisodes(id, select.value);
          await loadEpisodes(id, validSeasons[0].season_number);
        } else {
          seasonsContainer.innerHTML = '';
        }
      } else {
        seasonsContainer.innerHTML = '';
      }
      
      document.getElementById('modalPlayBtn').onclick = () => {
        if (type === 'movie') playNow(id, 'movie', data.title || data.name);
        else playNow(id, 'tv', data.name || data.title, 1, 1);
        closeModal();
      };
      document.getElementById('modalSaveBtn').onclick = () => toggleWatchlist(id, data.title || data.name, `${IMG_BASE}${data.poster_path}`, (data.release_date || data.first_air_date || '').slice(0,4), type);
    } catch (err) { console.error(err); closeModal(); }
  }

  async function loadEpisodes(tvId, seasonNum) {
    try {
      const data = await fetchTMDB(`/tv/${tvId}/season/${seasonNum}`);
      const container = document.getElementById('episodesList');
      if (!container) return;
      container.innerHTML = (data.episodes || []).map(ep => `
        <div class="episode-item" data-season="${seasonNum}" data-epnum="${ep.episode_number}">
          <img class="episode-img" src="${IMG_BASE}${ep.still_path}" onerror="this.src='https://via.placeholder.com/140x80'">
          <div><strong>${ep.episode_number}. ${ep.name}</strong><br><span style="font-size:13px;color:#aaa;">${ep.overview?.substring(0,80) || 'No description'}</span></div>
        </div>
      `).join('');
      document.querySelectorAll('.episode-item').forEach(el => {
        el.addEventListener('click', () => {
          playNow(tvId, 'tv', currentModalData?.name || currentModalData?.title, parseInt(el.dataset.season), parseInt(el.dataset.epnum));
          closeModal();
        });
      });
    } catch (e) { console.error(e); }
  }

  function playNow(id, type, title, season = null, episode = null) {
    const overlay = document.getElementById('playerOverlay');
    const iframe = document.getElementById('playerFrame');
    let url = '';
    if (type === 'movie') {
      url = `${VIDAPI_MOVIE}${id}?autoplay=true&primarycolor=E50914&icons=netflix&title=true`;
    } else {
      url = `${VIDAPI_TV}${id}/${season}/${episode}?autoplay=true&primarycolor=E50914&icons=netflix`;
    }
    iframe.src = url;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    let existing = continueWatching.find(c => c.id === id && c.type === type);
    if (!existing) {
      const poster = type === 'movie' ? `${IMG_BASE}${moviesList.find(m => m.id == id)?.poster_path || ''}` : `${IMG_BASE}${tvList.find(t => t.id == id)?.poster_path || ''}`;
      continueWatching.unshift({ id, title, type, season, episode, poster, progress: 0 });
      continueWatching = continueWatching.slice(0, 20);
      localStorage.setItem('sv_continue', JSON.stringify(continueWatching));
    }
  }

  function toggleWatchlist(id, title, poster, year, type) {
    const exists = watchlist.find(w => w.id === id);
    if (exists) {
      watchlist = watchlist.filter(w => w.id !== id);
    } else {
      watchlist.push({ id, title, poster, year, type });
    }
    localStorage.setItem('sv_watchlist', JSON.stringify(watchlist));
    if (currentCategory === 'watchlist') renderSections();
    alert(exists ? 'Removed from My List' : 'Added to My List');
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
  }

  function closePlayer() {
    document.getElementById('playerOverlay').classList.remove('active');
    document.getElementById('playerFrame').src = '';
    document.body.style.overflow = '';
  }

  // Event Listeners
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('exitPlayerBtn').addEventListener('click', closePlayer);
  
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      currentCategory = link.dataset.category;
      searchQuery = '';
      selectedGenre = '';
      document.getElementById('searchInput').value = '';
      if (currentCategory === 'movie' || currentCategory === 'tv') {
        if (!searchQuery) loadInitialData();
        else renderSections();
      } else {
        document.getElementById('heroBanner').style.display = 'none';
        renderSections();
      }
    });
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    if (searchQuery) {
      searchContent(searchQuery);
    } else {
      loadInitialData();
    }
  });
  
  loadInitialData();
</script>
</body>
</html>
