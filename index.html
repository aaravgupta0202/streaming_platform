<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a26;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #e44040;
    --accent-glow: rgba(228, 64, 64, 0.25);
    --accent-soft: #2a1515;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid;
    place-items: center;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  /* ─── Search ─── */
  .search-wrap {
    max-width: 520px;
    width: 100%;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 12px 20px 12px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-wrap input::placeholder { color: var(--text-dim); }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-wrap .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  /* ─── Main ─── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── Player Section ─── */
  .player-section {
    display: none;
    margin-bottom: 48px;
    animation: fadeUp 0.5s ease;
  }

  .player-section.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .player-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .player-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .player-meta {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  .btn-close-player {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .btn-close-player:hover { background: var(--surface-hover); }

  .player-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .player-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ─── States ─── */
  .state-message {
    text-align: center;
    padding: 100px 20px;
  }

  .state-message .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .state-message h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .state-message p {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 360px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ─── Results Grid ─── */
  .results-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 20px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
  }

  .card {
    cursor: pointer;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
    position: relative;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border-color: var(--accent);
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface-hover);
  }

  .card-info {
    padding: 12px 14px 14px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-year {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .card-rating {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #fbbf24;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ─── Loading spinner ─── */
  .spinner {
    display: none;
    text-align: center;
    padding: 60px;
  }

  .spinner.active { display: block; }

  .spinner::after {
    content: '';
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    header { padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 18px; }
    .search-wrap { max-width: 100%; order: 3; }
    main { padding: 24px 16px 60px; }
    .results-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .player-title { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
    StreamVault
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search movies by title…" autocomplete="off">
  </div>
</header>

<main>
  <!-- Player -->
  <section class="player-section" id="playerSection">
    <div class="player-header">
      <div>
        <div class="player-title" id="playerTitle"></div>
        <div class="player-meta" id="playerMeta"></div>
      </div>
      <button class="btn-close-player" onclick="closePlayer()">✕ Close</button>
    </div>
    <div class="player-container">
      <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
  </section>

  <!-- Default State -->
  <div id="defaultState" class="state-message">
    <div class="icon">🎬</div>
    <h2>What are you watching tonight?</h2>
    <p>Search for any movie by title to start streaming instantly.</p>
  </div>

  <!-- Loading -->
  <div id="spinner" class="spinner"></div>

  <!-- No Results -->
  <div id="noResults" class="state-message" style="display:none;">
    <div class="icon">🔍</div>
    <h2>No results found</h2>
    <p>Try a different title or check the spelling.</p>
  </div>

  <!-- Results -->
  <div id="resultsContainer" style="display:none;">
    <div class="results-label" id="resultsLabel"></div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</main>

<script>
  const TMDB_API = 'https://api.themoviedb.org/3';
  const TMDB_KEY = '559984e37355f1c1e498fb0e56e3a599'; // public demo key
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  const PLAYER_BASE = 'https://vidapi.qzz.io/movie/';

  const searchInput = document.getElementById('searchInput');
  const resultsContainer = document.getElementById('resultsContainer');
  const resultsGrid = document.getElementById('resultsGrid');
  const resultsLabel = document.getElementById('resultsLabel');
  const defaultState = document.getElementById('defaultState');
  const noResults = document.getElementById('noResults');
  const spinner = document.getElementById('spinner');
  const playerSection = document.getElementById('playerSection');
  const playerFrame = document.getElementById('playerFrame');
  const playerTitle = document.getElementById('playerTitle');
  const playerMeta = document.getElementById('playerMeta');

  let debounceTimer;

  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = searchInput.value.trim();
    if (!q) {
      resetUI();
      return;
    }
    debounceTimer = setTimeout(() => searchMovies(q), 400);
  });

  async function searchMovies(query) {
    showOnly('spinner');
    try {
      const res = await fetch(`${TMDB_API}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&include_adult=false`);
      const data = await res.json();
      const movies = (data.results || []).filter(m => m.poster_path);

      if (movies.length === 0) {
        showOnly('noResults');
        return;
      }

      resultsLabel.textContent = `${movies.length} result${movies.length > 1 ? 's' : ''} for "${query}"`;
      resultsGrid.innerHTML = movies.map(m => `
        <div class="card" onclick="playMovie(${m.id}, '${escapeAttr(m.title)}', '${(m.release_date || '').slice(0, 4)}', ${(m.vote_average || 0).toFixed(1)})">
          ${m.vote_average ? `<div class="card-rating">★ ${m.vote_average.toFixed(1)}</div>` : ''}
          <img class="card-poster" src="${IMG_BASE}${m.poster_path}" alt="${escapeAttr(m.title)}" loading="lazy">
          <div class="card-info">
            <div class="card-title">${escapeHTML(m.title)}</div>
            <div class="card-year">${(m.release_date || '').slice(0, 4)}</div>
          </div>
        </div>
      `).join('');

      showOnly('resultsContainer');
    } catch (e) {
      console.error(e);
      showOnly('noResults');
    }
  }

  function playMovie(tmdbId, title, year, rating) {
    playerFrame.src = `${PLAYER_BASE}${tmdbId}?autoplay=true&primarycolor=E44040&secondarycolor=2A1515&iconcolor=FFFFFF&icons=netflix&poster=true&title=true`;
    playerTitle.textContent = title;
    playerMeta.textContent = [year, rating ? `★ ${rating}` : ''].filter(Boolean).join(' · ');
    playerSection.classList.add('active');
    playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closePlayer() {
    playerFrame.src = '';
    playerSection.classList.remove('active');
  }

  function showOnly(id) {
    ['defaultState', 'noResults', 'resultsContainer', 'spinner'].forEach(el => {
      document.getElementById(el).style.display = 'none';
    });
    document.getElementById(el = id).style.display = id === 'spinner' ? 'block' : (id === 'resultsContainer' ? 'block' : '');
    if (id === 'noResults' || id === 'defaultState') document.getElementById(id).style.display = '';
  }

  function resetUI() {
    closePlayer();
    showOnly('defaultState');
  }

  function escapeHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escapeAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '\\"'); }
</script>

</body>
</html>
