<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>StreamVault | Watch Anywhere</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a0f;
    --bg-card: #14141f;
    --bg-elevated: #1c1c2a;
    --border: #2a2a38;
    --text-primary: #ffffff;
    --text-secondary: #a0a0b8;
    --accent: #e50914;
    --accent-hover: #b81d24;
    --success: #2e8b57;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
  }

  /* Header Netflix Style */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
    backdrop-filter: blur(10px);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    font-weight: 600;
  }

  .nav-link {
    cursor: pointer;
    transition: 0.2s;
    color: var(--text-secondary);
  }

  .nav-link.active, .nav-link:hover {
    color: var(--accent);
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border-radius: 40px;
    padding: 8px 18px;
    gap: 10px;
    border: 1px solid transparent;
    transition: 0.2s;
  }

  .search-bar:focus-within {
    border-color: var(--accent);
    background: rgba(0,0,0,0.7);
  }

  .search-bar input {
    background: transparent;
    border: none;
    color: white;
    font-size: 14px;
    width: 220px;
    outline: none;
  }

  .search-bar input::placeholder {
    color: var(--text-secondary);
  }

  .genre-filter {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 20px 40px 0 40px;
    margin-bottom: 20px;
    scrollbar-width: thin;
  }

  .genre-chip {
    background: rgba(255,255,255,0.05);
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.2s;
    border: 1px solid transparent;
  }

  .genre-chip:hover, .genre-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  main {
    padding: 0 40px 60px 40px;
  }

  /* Hero Banner */
  .hero-banner {
    height: 480px;
    border-radius: 24px;
    margin-bottom: 40px;
    background-size: cover;
    background-position: center 20%;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 40px;
    box-shadow: inset 0 -120px 60px -30px rgba(0,0,0,0.8);
  }

  .hero-content {
    max-width: 550px;
  }

  .hero-title {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .hero-meta {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #ddd;
  }

  .match {
    color: #46d369;
    font-weight: bold;
  }

  .hero-desc {
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 24px;
    color: #ddd;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
  }

  .btn-play, .btn-add {
    padding: 10px 28px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    border: none;
    transition: 0.2s;
  }

  .btn-play {
    background: white;
    color: black;
  }

  .btn-play:hover {
    background: #e6e6e6;
  }

  .btn-add {
    background: rgba(109, 109, 110, 0.7);
    color: white;
  }

  /* Sections */
  .section {
    margin-top: 48px;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .scroll-x {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 16px;
    scrollbar-width: thin;
  }

  .movie-card {
    flex: 0 0 180px;
    cursor: pointer;
    transition: transform 0.25s;
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .movie-card:hover {
    transform: scale(1.05);
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: var(--radius-md);
    background: var(--bg-card);
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin-top: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Modal Styles (Netflix Popup) */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(16px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 40px;
    overflow-y: auto;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-container {
    max-width: 950px;
    width: 100%;
    background: var(--bg-elevated);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp 0.3s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-banner {
    height: 380px;
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .modal-banner-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(to top, var(--bg-elevated), transparent);
  }

  .modal-content {
    padding: 24px 32px 32px;
  }

  .modal-title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .modal-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .modal-rating {
    color: #ffcd4a;
  }

  .modal-buttons {
    display: flex;
    gap: 16px;
    margin: 20px 0;
  }

  .modal-desc {
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
    background: rgba(0,0,0,0.3);
    padding: 16px;
    border-radius: 12px;
  }

  .modal-info-item strong {
    color: var(--accent);
    font-size: 12px;
    display: block;
  }

  .actors-list {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .actor-chip {
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .actor-chip:hover {
    background: var(--accent);
  }

  .seasons-select {
    background: var(--bg-card);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: white;
    margin: 16px 0;
    width: 200px;
  }

  .episodes-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 300px;
    overflow-y: auto;
  }

  .episode-item {
    display: flex;
    gap: 16px;
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .episode-item:hover {
    background: rgba(229,9,20,0.2);
    transform: translateX(6px);
  }

  .episode-img {
    width: 140px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 30px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    z-index: 10;
  }

  /* Fullscreen Player */
  .player-full {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 2000;
    display: none;
    flex-direction: column;
  }

  .player-full.active {
    display: flex;
  }

  .player-header-nav {
    padding: 20px;
    background: linear-gradient(to bottom, black, transparent);
    z-index: 10;
  }

  .player-back {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
  }

  .player-frame {
    flex: 1;
    width: 100%;
    border: none;
  }

  .spinner {
    text-align: center;
    padding: 60px;
    display: none;
  }

  .spinner.active {
    display: block;
  }

  .spinner::after {
    content: '';
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .header { padding: 12px 20px; }
    main { padding: 0 16px 40px; }
    .hero-banner { height: 380px; padding: 20px; }
    .hero-title { font-size: 32px; }
    .movie-card { flex: 0 0 140px; }
    .modal-container { max-width: 95%; }
    .modal-banner { height: 240px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">STREAMVAULT</div>
  <div class="nav-links">
    <span class="nav-link active" data-category="movie">Movies</span>
    <span class="nav-link" data-category="tv">TV Shows</span>
    <span class="nav-link" data-category="continue">Continue</span>
    <span class="nav-link" data-category="watchlist">My List</span>
  </div>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search titles, actors, genres...">
  </div>
</div>

<div class="genre-filter" id="genreFilter"></div>

<main>
  <div id="heroBanner" class="hero-banner" style="display: none;"></div>
  <div id="contentSections"></div>
  <div id="spinner" class="spinner"></div>
</main>

<!-- Modal Preview -->
<div id="detailModal" class="modal-overlay">
  <div class="modal-container">
    <button class="close-modal" id="closeModalBtn">✕</button>
    <div id="modalBanner" class="modal-banner"></div>
    <div class="modal-content">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalStats" class="modal-stats"></div>
      <div class="modal-buttons">
        <button id="modalPlayBtn" class="btn-play">▶ Play</button>
        <button id="modalSaveBtn" class="btn-add">+ My List</button>
      </div>
      <div id="modalDesc" class="modal-desc"></div>
      <div id="modalInfoGrid" class="modal-info-grid"></div>
      <div id="seasonsEpisodesContainer"></div>
    </div>
  </div>
</div>

<!-- Fullscreen Player -->
<div id="playerOverlay" class="player-full">
  <div class="player-header-nav">
    <button id="exitPlayerBtn" class="player-back">← Back</button>
  </div>
  <iframe id="playerFrame" class="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
  // ---------- IMDbAPI v2 + LocalStorage ----------
  const IMDB_API = 'https://api.imdbapi.dev/v1';
  const VIDAPI_MOVIE = 'https://vidapi.qzz.io/movie/';
  const VIDAPI_TV = 'https://vidapi.qzz.io/tv/';
  
  // State
  let currentCategory = 'movie'; // movie, tv, continue, watchlist
  let searchQuery = '';
  let selectedGenre = '';
  let allMovies = [];
  let allShows = [];
  let watchlist = JSON.parse(localStorage.getItem('sv_watchlist') || '[]');
  let continueWatching = JSON.parse(localStorage.getItem('sv_continue') || '[]');
  
  let currentModalData = null;
  
  // Genres list (common mapping)
  const genreMap = {
    'Action': 'Action', 'Adventure': 'Adventure', 'Animation': 'Animation', 'Comedy': 'Comedy',
    'Crime': 'Crime', 'Documentary': 'Documentary', 'Drama': 'Drama', 'Family': 'Family',
    'Fantasy': 'Fantasy', 'Horror': 'Horror', 'Romance': 'Romance', 'Sci-Fi': 'Sci-Fi',
    'Thriller': 'Thriller'
  };
  
  // Helper: fetch from IMDbAPI
  async function fetchIMDb(endpoint) {
    const res = await fetch(`${IMDB_API}${endpoint}`);
    if (!res.ok) throw new Error('IMDb API error');
    return res.json();
  }
  
  // Search titles (movies or TV)
  async function searchTitles(query, type = 'movie') {
    try {
      const titleType = type === 'movie' ? 'MOVIE' : 'TV_SERIES';
      const url = `/titles?types=${titleType}&sortBy=SORT_BY_POPULARITY&limit=50${query ? `&search=${encodeURIComponent(query)}` : ''}`;
      const data = await fetchIMDb(url);
      return data.titles || [];
    } catch(e) { console.warn(e); return []; }
  }
  
  // Get full title details by ID
  async function getTitleDetails(imdbId) {
    return await fetchIMDb(`/titles/${imdbId}`);
  }
  
  // Get episodes for a TV show
  async function getEpisodes(imdbId, seasonNum) {
    try {
      const data = await fetchIMDb(`/titles/${imdbId}/episodes?season=${seasonNum}&pageSize=50`);
      return data.episodes || [];
    } catch(e) { return []; }
  }
  
  // Get actor details
  async function getActorDetails(nameId) {
    return await fetchIMDb(`/names/${nameId}`);
  }
  
  // Load hero and initial content
  async function loadHome() {
    document.getElementById('spinner').classList.add('active');
    try {
      const movies = await searchTitles('', 'movie');
      const shows = await searchTitles('', 'tv');
      allMovies = movies.slice(0, 30);
      allShows = shows.slice(0, 30);
      renderHero(movies[0]);
      renderSections();
      renderGenreFilters();
    } catch(e) { console.error(e); }
    document.getElementById('spinner').classList.remove('active');
  }
  
  function renderHero(title) {
    if (!title || currentCategory !== 'movie') {
      document.getElementById('heroBanner').style.display = 'none';
      return;
    }
    const heroDiv = document.getElementById('heroBanner');
    heroDiv.style.display = 'flex';
    heroDiv.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.5)), url(${title.primaryImage?.url || ''})`;
    heroDiv.innerHTML = `
      <div class="hero-content">
        <div class="hero-title">${title.primaryTitle || title.originalTitle}</div>
        <div class="hero-meta"><span class="match">98% Match</span> <span>${title.startYear || ''}</span> <span>${title.runtimeSeconds ? Math.floor(title.runtimeSeconds/60)+' min' : ''}</span></div>
        <div class="hero-desc">${title.plot?.substring(0, 180) || 'No description available.'}</div>
        <div class="hero-buttons"><button class="btn-play" data-id="${title.id}">▶ Play</button><button class="btn-add" data-id="${title.id}">+ My List</button></div>
      </div>
    `;
    document.querySelector('.hero-buttons .btn-play')?.addEventListener('click', () => playNow(title.id, 'movie', title.primaryTitle));
    document.querySelector('.hero-buttons .btn-add')?.addEventListener('click', () => toggleWatchlist(title.id, title.primaryTitle, title.primaryImage?.url, title.startYear));
  }
  
  function renderSections() {
    const container = document.getElementById('contentSections');
    container.innerHTML = '';
    
    if (currentCategory === 'continue') {
      renderContinueWatching(container);
      return;
    }
    if (currentCategory === 'watchlist') {
      renderWatchlist(container);
      return;
    }
    
    let items = currentCategory === 'movie' ? allMovies : allShows;
    if (searchQuery) {
      items = items.filter(i => (i.primaryTitle || i.originalTitle || '').toLowerCase().includes(searchQuery.toLowerCase()));
    }
    if (selectedGenre && selectedGenre !== 'All') {
      items = items.filter(i => i.genres?.includes(selectedGenre));
    }
    
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-header"><h2 class="section-title">${currentCategory === 'movie' ? 'Trending Movies' : 'Popular TV Shows'}</h2></div><div class="scroll-x" id="scrollGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#scrollGrid');
    items.forEach(item => {
      const card = createCard(item, currentCategory);
      grid.appendChild(card);
    });
  }
  
  function createCard(item, type) {
    const div = document.createElement('div');
    div.className = 'movie-card';
    div.innerHTML = `
      <img class="card-poster" src="${item.primaryImage?.url || 'https://via.placeholder.com/300x450?text=No+Poster'}" loading="lazy">
      <div class="card-title">${item.primaryTitle || item.originalTitle}</div>
    `;
    div.addEventListener('click', () => showModal(item.id, type));
    return div;
  }
  
  function renderContinueWatching(container) {
    if (!continueWatching.length) {
      container.innerHTML = '<div style="text-align:center;padding:80px;">🎬 No continue watching yet. Start a movie!</div>';
      return;
    }
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<h2 class="section-title">Continue Watching</h2><div class="scroll-x" id="continueGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#continueGrid');
    continueWatching.forEach(item => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `<img class="card-poster" src="${item.poster || 'https://via.placeholder.com/300x450'}" loading="lazy"><div class="card-title">${item.title}</div><div style="font-size:12px;color:#46d369;">${Math.floor(item.progress/60)} min watched</div>`;
      card.addEventListener('click', () => resumePlay(item));
      grid.appendChild(card);
    });
  }
  
  function renderWatchlist(container) {
    if (!watchlist.length) {
      container.innerHTML = '<div style="text-align:center;padding:80px;">📋 Your watchlist is empty. Add movies you love!</div>';
      return;
    }
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<h2 class="section-title">My List</h2><div class="scroll-x" id="watchlistGrid"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('#watchlistGrid');
    watchlist.forEach(item => {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `<img class="card-poster" src="${item.poster}" loading="lazy"><div class="card-title">${item.title}</div>`;
      card.addEventListener('click', () => showModal(item.id, item.type));
      grid.appendChild(card);
    });
  }
  
  function renderGenreFilters() {
    const container = document.getElementById('genreFilter');
    container.innerHTML = '<div class="genre-chip" data-genre="All">All</div>';
    Object.keys(genreMap).forEach(g => {
      const chip = document.createElement('div');
      chip.className = `genre-chip ${selectedGenre === g ? 'active' : ''}`;
      chip.innerText = g;
      chip.dataset.genre = g;
      chip.addEventListener('click', () => {
        selectedGenre = selectedGenre === g ? '' : g;
        renderSections();
        renderGenreFilters();
      });
      container.appendChild(chip);
    });
  }
  
  // ---------- Modal with Actors, Episodes etc ----------
  async function showModal(imdbId, type) {
    const modal = document.getElementById('detailModal');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    try {
      const data = await getTitleDetails(imdbId);
      currentModalData = data;
      document.getElementById('modalBanner').style.backgroundImage = `url(${data.primaryImage?.url || ''})`;
      document.getElementById('modalTitle').innerText = data.primaryTitle || data.originalTitle;
      document.getElementById('modalStats').innerHTML = `${data.startYear || ''} • ${data.runtimeSeconds ? Math.floor(data.runtimeSeconds/60)+' min' : ''} • <span class="modal-rating">⭐ ${data.rating?.aggregateRating || 'N/A'}/10</span>`;
      document.getElementById('modalDesc').innerText = data.plot || 'No description.';
      
      let actorsHtml = '<div class="modal-info-item"><strong>Cast</strong><div class="actors-list">';
      (data.stars || []).slice(0,5).forEach(actor => {
        actorsHtml += `<span class="actor-chip" data-nameid="${actor.id}">${actor.displayName || actor.name}</span>`;
      });
      actorsHtml += '</div></div>';
      let directorsStr = (data.directors || []).map(d => d.displayName).join(', ') || 'N/A';
      let genresStr = (data.genres || []).join(', ');
      document.getElementById('modalInfoGrid').innerHTML = `
        ${actorsHtml}
        <div class="modal-info-item"><strong>Directors</strong> ${directorsStr}</div>
        <div class="modal-info-item"><strong>Genres</strong> ${genresStr}</div>
        <div class="modal-info-item"><strong>Languages</strong> ${(data.spokenLanguages || []).map(l=>l.name).join(', ') || 'English'}</div>
      `;
      // attach actor clicks
      document.querySelectorAll('.actor-chip').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          showActorProfile(el.dataset.nameid);
        });
      });
      
      const seasonsContainer = document.getElementById('seasonsEpisodesContainer');
      if (type === 'tv' && data.type === 'TV_SERIES') {
        const seasons = await getSeasonsList(imdbId);
        seasonsContainer.innerHTML = `<select id="seasonSelect" class="seasons-select"></select><div id="episodesList" class="episodes-list"></div>`;
        const select = document.getElementById('seasonSelect');
        for (let i = 1; i <= (data.numberOfSeasons || 1); i++) {
          select.innerHTML += `<option value="${i}">Season ${i}</option>`;
        }
        select.onchange = () => loadEpisodesUI(imdbId, select.value);
        await loadEpisodesUI(imdbId, '1');
      } else {
        seasonsContainer.innerHTML = '';
      }
      
      document.getElementById('modalPlayBtn').onclick = () => {
        if (type === 'movie') playNow(imdbId, 'movie', data.primaryTitle);
        else playNow(imdbId, 'tv', data.primaryTitle, 1, 1);
        closeModal();
      };
      document.getElementById('modalSaveBtn').onclick = () => toggleWatchlist(imdbId, data.primaryTitle, data.primaryImage?.url, data.startYear, type);
    } catch(err) { console.error(err); closeModal(); }
  }
  
  async function getSeasonsList(tvId) {
    try {
      const data = await getTitleDetails(tvId);
      return data.numberOfSeasons || 1;
    } catch(e) { return 1; }
  }
  
  async function loadEpisodesUI(tvId, seasonNum) {
    const episodes = await getEpisodes(tvId, seasonNum);
    const container = document.getElementById('episodesList');
    if (!container) return;
    container.innerHTML = episodes.map(ep => `
      <div class="episode-item" data-season="${seasonNum}" data-epnum="${ep.episodeNumber || 1}" data-ep-title="${ep.title || 'Episode'}">
        <img class="episode-img" src="${ep.primaryImage?.url || ''}" onerror="this.src='https://via.placeholder.com/140x80'">
        <div><strong>${ep.episodeNumber}. ${ep.title}</strong><br><span style="font-size:13px;color:#aaa;">${ep.plot?.substring(0,80) || ''}</span></div>
      </div>
    `).join('');
    document.querySelectorAll('.episode-item').forEach(el => {
      el.addEventListener('click', () => {
        const epNum = parseInt(el.dataset.epnum);
        playNow(tvId, 'tv', currentModalData?.primaryTitle, parseInt(seasonNum), epNum);
        closeModal();
      });
    });
  }
  
  async function showActorProfile(nameId) {
    const actor = await getActorDetails(nameId);
    if (!actor) return;
    alert(`🎭 ${actor.displayName}\n📖 ${actor.biography?.substring(0, 200) || 'No bio available'}\n⭐ Known for: ${(actor.primaryProfessions || []).join(', ')}`);
  }
  
  // Playback & Progress
  function playNow(imdbId, type, title, season = null, episode = null) {
    const overlay = document.getElementById('playerOverlay');
    const iframe = document.getElementById('playerFrame');
    let url = '';
    if (type === 'movie') {
      url = `${VIDAPI_MOVIE}${imdbId}?autoplay=true&primarycolor=E50914&icons=netflix&title=true`;
    } else {
      url = `${VIDAPI_TV}${imdbId}/${season}/${episode}?autoplay=true&primarycolor=E50914&icons=netflix`;
    }
    iframe.src = url;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    // save continue watching (mock progress)
    saveProgress(imdbId, title, type, season, episode);
  }
  
  function saveProgress(id, title, type, season, episode) {
    let existing = continueWatching.find(c => c.id === id && c.type === type);
    if (!existing) {
      continueWatching.unshift({ id, title, type, season, episode, progress: 0, poster: '' });
      continueWatching = continueWatching.slice(0, 20);
      localStorage.setItem('sv_continue', JSON.stringify(continueWatching));
    }
  }
  
  function resumePlay(item) {
    if (item.type === 'movie') playNow(item.id, 'movie', item.title);
    else playNow(item.id, 'tv', item.title, item.season || 1, item.episode || 1);
  }
  
  function toggleWatchlist(id, title, poster, year, type = 'movie') {
    const exists = watchlist.find(w => w.id === id);
    if (exists) {
      watchlist = watchlist.filter(w => w.id !== id);
    } else {
      watchlist.push({ id, title, poster, year, type });
    }
    localStorage.setItem('sv_watchlist', JSON.stringify(watchlist));
    if (currentCategory === 'watchlist') renderSections();
    alert(exists ? 'Removed from My List' : 'Added to My List');
  }
  
  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  function closePlayer() {
    document.getElementById('playerOverlay').classList.remove('active');
    document.getElementById('playerFrame').src = '';
    document.body.style.overflow = '';
  }
  
  // Event bindings
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('exitPlayerBtn').addEventListener('click', closePlayer);
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      currentCategory = link.dataset.category;
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      selectedGenre = '';
      if (currentCategory === 'movie' || currentCategory === 'tv') {
        loadHome();
      } else {
        renderSections();
        document.getElementById('heroBanner').style.display = 'none';
      }
    });
  });
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    if (currentCategory === 'movie' || currentCategory === 'tv') {
      renderSections();
    }
  });
  
  loadHome();
</script>
</body>
</html>
