<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>StreamVault</h1>
  <input type="text" id="search" placeholder="Search...">
</header>

<main>
  <section id="hero"></section>

  <section>
    <h2>Continue Watching</h2>
    <div id="continueRow" class="row"></div>
  </section>

  <section>
    <h2>Trending</h2>
    <div id="trendingRow" class="row"></div>
  </section>

  <section>
    <h2>Movies</h2>
    <div id="movieRow" class="row"></div>
  </section>

  <section>
    <h2>TV Shows</h2>
    <div id="tvRow" class="row"></div>
  </section>
</main>

<div id="modal"></div>
<div id="playerOverlay" class="hidden"></div>

<script src="app.js" type="module"></script>
</body>
</html>
