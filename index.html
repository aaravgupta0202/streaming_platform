<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>StreamVault</h1>
  <input type="text" id="search" placeholder="Search movies or shows...">
</header>

<!-- HERO -->
<section id="hero"></section>

<!-- ROWS -->
<section>
  <h2>Trending</h2>
  <div id="trending" class="row"></div>
</section>

<section>
  <h2>Movies</h2>
  <div id="movies" class="row"></div>
</section>

<section>
  <h2>TV Shows</h2>
  <div id="tv" class="row"></div>
</section>

<!-- MODAL -->
<div id="modal" class="hidden"></div>

<!-- PLAYER -->
<div id="player" class="hidden"></div>

<script src="app.js"></script>
</body>
</html>
