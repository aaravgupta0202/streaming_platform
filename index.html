<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>StreamVault | Movies • Shows • Live</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1e1e2a;
    --border: #28283a;
    --text: #ededf0;
    --text-dim: #8a8a9e;
    --accent: #e44040;
    --accent-glow: rgba(228,64,64,0.3);
    --accent-soft: #2a151f;
    --radius-card: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
  }

  /* grain texture */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 18px 30px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(18px);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .logo-icon svg { width: 20px; height: 20px; fill: white; }
  .tabs {
    display: flex;
    gap: 10px;
    background: var(--surface);
    padding: 5px;
    border-radius: 60px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    background: transparent;
    border: none;
    padding: 8px 22px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border-radius: 40px;
    color: var(--text-dim);
    cursor: pointer;
    transition: 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 10px rgba(228,64,64,0.3);
  }
  .search-wrap {
    flex: 1;
    max-width: 460px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 20px 12px 46px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 48px;
    color: var(--text);
    font-size: 14px;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }

  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 30px 24px 70px;
  }

  /* player modal / section */
  .player-section {
    display: none;
    margin-bottom: 48px;
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.35s ease;
  }
  .player-section.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  .player-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .player-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .player-meta { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .btn-close {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 13px;
  }
  .player-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: black;
  }
  .player-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .section-title {
    font-size: 22px;
    font-weight: 700;
    margin: 32px 0 16px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .grid-scroll {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border 0.2s;
  }
  .card:hover { transform: translateY(-5px); border-color: var(--accent); }
  .poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    background: #1c1c28;
  }
  .card-info { padding: 12px 12px 14px; }
  .card-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-year { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; justify-content: space-between; }
  .rating { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #ffcd4a; position: absolute; top: 8px; right: 8px; border-radius: 20px; }
  .card { position: relative; }
  .spinner { text-align: center; padding: 60px; display: none; }
  .spinner.active { display: block; }
  .spinner::after { content: ''; display: inline-block; width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-message { text-align: center; padding: 70px 16px; }
  .hor-section { margin-top: 20px; }
  .continue-watch-grid { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: thin; }
  .continue-card { flex: 0 0 160px; background: var(--surface); border-radius: 16px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
  .continue-card:hover { border-color: var(--accent); transform: scale(0.98); }
  .continue-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 14px 14px 0 0; }
  .continue-info { padding: 10px; }
  .progress-bar-bg { background: #2a2a3a; border-radius: 20px; height: 6px; margin-top: 8px; width: 100%; overflow: hidden; }
  .progress-fill { width: 0%; background: var(--accent); height: 100%; border-radius: 20px; }
  @media (max-width: 700px) {
    .header-top { flex-direction: column; align-items: stretch; }
    .tabs { align-self: center; }
    .grid-scroll { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .section-title { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
      StreamVault
    </div>
    <div class="tabs" id="tabContainer">
      <button class="tab-btn active" data-tab="movies">🎬 Movies</button>
      <button class="tab-btn" data-tab="tv">📺 TV Shows</button>
      <button class="tab-btn" data-tab="live">🔴 Live Racing</button>
    </div>
    <div class="search-wrap" id="searchWrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="globalSearch" placeholder="Search movies or TV shows... (TMDB)">
    </div>
  </div>
</header>

<main>
  <!-- Player Section (global) -->
  <div id="playerSection" class="player-section">
    <div class="player-header">
      <div><div class="player-title" id="playerTitle"></div><div class="player-meta" id="playerMeta"></div></div>
      <button class="btn-close" id="closePlayerBtn">✕ Close</button>
    </div>
    <div class="player-container"><iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe></div>
  </div>

  <!-- Continue Watching (cache) -->
  <div id="continueSection" style="display: none;">
    <div class="section-title">⏯️ Continue Watching</div>
    <div class="continue-watch-grid" id="continueGrid"></div>
  </div>

  <!-- Categories / dynamic content -->
  <div id="dynamicContent"></div>
  <div id="spinner" class="spinner"></div>
  <div id="noResultsMsg" class="state-message" style="display:none;"><div class="icon">📭</div><h2>No results</h2><p>Try different keywords</p></div>
</main>

<script>
  // ---------- CONFIG ----------
  const TMDB_API = 'https://api.themoviedb.org/3';
  const TMDB_KEY = '8f8c7b0e8aefce789115fc66fd672df1';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  const VIDAPI_MOVIE = 'https://vidapi.qzz.io/movie/';
  const VIDAPI_TV = 'https://vidapi.qzz.io/tv/';
  // Live stream proxy (embed from friend's pattern)
  const LIVESTREAM_URL = 'https://streamfree.app/embed/racing/skyf1?server=origin&quality=1080p&category=racing';

  // Global state
  let currentTab = 'movies';   // movies, tv, live
  let searchQuery = '';
  let currentMediaPlaying = null; // store last played for progress saving { type, id, title, year, season?, episode?, timestamp }

  // ------ LocalStorage "Continue Watching" (movies & tv only, no live) ------
  let continueWatching = []; // array of items { type, tmdbId, title, poster, year, season, episode, progressSec, totalDuration? optional, updatedAt }
  
  function loadContinueWatching() {
    const stored = localStorage.getItem('streamvault_continue');
    if(stored) {
      try {
        continueWatching = JSON.parse(stored);
      } catch(e) {}
    }
    if(!continueWatching) continueWatching = [];
    renderContinueSection();
  }
  
  function saveContinueWatching() {
    localStorage.setItem('streamvault_continue', JSON.stringify(continueWatching.slice(0, 20)));
    renderContinueSection();
  }
  
  function updateProgress(type, tmdbId, title, poster, year, progressSec, season=null, episode=null) {
    if(type === 'live') return; // Live not stored
    const existingIndex = continueWatching.findIndex(item => item.type === type && item.tmdbId === tmdbId && (type !== 'tv' || (item.season === season && item.episode === episode)));
    const entry = { type, tmdbId, title, poster, year, progressSec, updatedAt: Date.now(), season, episode };
    if(existingIndex !== -1) {
      continueWatching[existingIndex].progressSec = progressSec;
      continueWatching[existingIndex].updatedAt = Date.now();
    } else {
      continueWatching.unshift(entry);
    }
    // keep only latest 30
    continueWatching = continueWatching.sort((a,b)=>b.updatedAt - a.updatedAt).slice(0,30);
    saveContinueWatching();
  }
  
  function renderContinueSection() {
    const sectionDiv = document.getElementById('continueSection');
    const grid = document.getElementById('continueGrid');
    if(!continueWatching.length) {
      sectionDiv.style.display = 'none';
      return;
    }
    sectionDiv.style.display = 'block';
    grid.innerHTML = continueWatching.map(item => {
      let subtitle = item.year || '';
      if(item.type === 'tv' && item.season && item.episode) subtitle += ` · S${item.season} E${item.episode}`;
      const progressPercent = Math.min(100, (item.progressSec / 3600) * 30); // rough visual; we just show progress bar but informative
      return `
        <div class="continue-card" data-type="${item.type}" data-id="${item.tmdbId}" data-season="${item.season || ''}" data-episode="${item.episode || ''}" data-title="${escapeAttr(item.title)}" data-year="${item.year || ''}" data-poster="${item.poster || ''}">
          <img class="continue-poster" src="${item.poster || 'https://via.placeholder.com/300x450?text=No+Poster'}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Poster+Missing'">
          <div class="continue-info">
            <div class="card-title" style="font-size:13px;">${escapeHTML(item.title)}</div>
            <div style="font-size:11px; color:#aaa">${subtitle}</div>
            <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
            <div style="font-size:10px; margin-top:4px;">▶️ Resume</div>
          </div>
        </div>
      `;
    }).join('');
    // attach click events to continue cards
    document.querySelectorAll('.continue-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const type = card.dataset.type;
        const id = card.dataset.id;
        const season = card.dataset.season ? parseInt(card.dataset.season) : null;
        const episode = card.dataset.episode ? parseInt(card.dataset.episode) : null;
        const title = card.dataset.title;
        const year = card.dataset.year;
        const poster = card.dataset.poster;
        const storedItem = continueWatching.find(i => i.tmdbId == id && i.type === type && (type!=='tv' || (i.season===season && i.episode===episode)));
        const progressSec = storedItem?.progressSec || 0;
        if(type === 'movies') {
          playMovie(id, title, year, null, progressSec);
        } else if(type === 'tv') {
          playTvEpisode(id, season, episode, title, year, progressSec);
        }
      });
    });
  }
  
  // ----- Helper escape -----
  function escapeHTML(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escapeAttr(s) { if(!s) return ''; return s.replace(/'/g,"\\'").replace(/"/g,'\\"'); }

  // ----- Player core with progress tracking -----
  let progressInterval = null;
  function clearProgressInterval() { if(progressInterval) { clearInterval(progressInterval); progressInterval = null; } }
  
  function setupProgressTracker(type, tmdbId, title, poster, year, season=null, episode=null) {
    clearProgressInterval();
    const iframe = document.getElementById('playerFrame');
    if(!iframe) return;
    // attempt to capture timeupdate via postMessage or simple interval emulation? Due to cross-origin, we can't access iframe content securely.
    // But we can mock: we start counting only when user clicks inside? Instead use periodic save every 5 seconds assuming player plays.
    // Actually we can embed a parameter "progress" to start video at given second and we estimate current time via player's API? Not possible.
    // Better: We track start time and maybe use a "resume hint": we pass progress param to iframe if supported (vidapi supports? yes, "progress" parameter)
    // And for saving: we can't pull time, but we give user a "save progress when they close" or we can store last saved timestamp using heuristic: 
    // We store the timestamp when close button is clicked, but for auto-save: we can assume user watches and after 20 sec we save incremental.
    // For simplicity: each 15 seconds we increment progress by 15 if the player is active and not paused? manual: we will add a "Save progress" button? 
    // But many platforms would not have access. But I'll implement: on close capture progress param from iframe url? Not reliable.
    // Better: I'll provide a simple UX: When close player, we ask for current progress? Not good. Let's embed progress start using parameter, and instruct user to use "Update watch progress" optional? No.
    // Provide a small hidden "Update progress" button? No, clean solution: use localStorage to store last manual? I'll add event: when player closed, we prompt? No.
    // Use a floating "Save progress" but ugly. Instead advanced: VidAPI supports "progress" parameter. We can read the iframe's src param but the player might not report. Anyway most users will manually know.
    // I'll implement a bookmark: store initial startTime, when close set progress to estimated minutes. But it's unreliable; but we provide "Mark as watched" ? 
    // I implement a simple "Save current progress" button only shown when playing? but adds complexity. I'll rely on the fact that when closing the player, we set progressSec = last known? Not accurate.
    // I'll add simple: we popup "Save progress?" on close? Too intrusive. So I'll implement "Progress: 0:00" in meta, and save on close using the "progress" parameter they might have.
    // Instead I decide to store on close with a default increment of 10 minutes? Not good. I'll postpone accuracy and rely on user's manual "resume from start"? but we can store the "start second" from player param.
    // Actually we can retrieve progress param from URL if user paused? No. So final: I store only start progress when playing. The "continue watching" will simply start from saved progress (if we saved initial).
    // We will implement "resume" only when we pass progress param and we save when closing: we get current time from iframe's window? not allowed. 
    // So for demonstration we hide progress inside "continue" showing last known roughly. But user can resume from same point via "progress param".
    // I'll make saving on close with a dialog simulating? I integrate small "Save current progress" button on player header.
    // Add quick save button:
    const saveBtn = document.createElement('button');
    saveBtn.textContent = '⏱️ Save progress';
    saveBtn.className = 'btn-close';
    saveBtn.style.marginRight = '10px';
    saveBtn.style.background = '#2d2d44';
    const existingHeader = document.querySelector('.player-header');
    if(existingHeader && !document.getElementById('customSaveBtn')) {
      saveBtn.id = 'customSaveBtn';
      existingHeader.insertBefore(saveBtn, document.getElementById('closePlayerBtn'));
      saveBtn.onclick = () => {
        let simulatedProgress = 0;
        const inputVal = prompt('Enter minutes watched (approx):', '30');
        if(inputVal !== null && !isNaN(parseInt(inputVal))) {
          simulatedProgress = parseInt(inputVal) * 60;
          updateProgress(type, tmdbId, title, poster, year, simulatedProgress, season, episode);
          alert(`Progress saved: ${Math.floor(simulatedProgress/60)} min`);
        }
      };
    }
    if(document.getElementById('customSaveBtn')) return;
  }

  // ----- Play functions -----
  function playMovie(tmdbId, title, year, rating, resumeSec = 0) {
    let url = `${VIDAPI_MOVIE}${tmdbId}?autoplay=true&primarycolor=E44040&secondarycolor=2A151F&iconcolor=FFFFFF&icons=netflix&poster=true&title=true`;
    if(resumeSec && resumeSec > 0) url += `&progress=${resumeSec}`;
    document.getElementById('playerFrame').src = url;
    document.getElementById('playerTitle').innerHTML = escapeHTML(title);
    document.getElementById('playerMeta').innerHTML = `${year || '—'} ${rating ? `★ ${rating}` : ''} • Movie`;
    document.getElementById('playerSection').classList.add('active');
    document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    // for continue watching update initial (if not zero)
    if(currentTab !== 'live') {
      const poster = ''; // we'll later fetch using poster from store
      updateProgress('movies', tmdbId, title, '', year, resumeSec);
    }
    setupProgressTracker('movies', tmdbId, title, '', year);
    currentMediaPlaying = { type: 'movie', tmdbId, title, year };
  }
  
  function playTvEpisode(tmdbId, season, episode, showTitle, year, resumeSec=0) {
    let url = `${VIDAPI_TV}${tmdbId}/${season}/${episode}?autoplay=true&primarycolor=E44040&secondarycolor=2A151F&icons=netflix&title=true&poster=true`;
    if(resumeSec && resumeSec > 0) url += `&progress=${resumeSec}`;
    document.getElementById('playerFrame').src = url;
    document.getElementById('playerTitle').innerHTML = `${escapeHTML(showTitle)} S${season} E${episode}`;
    document.getElementById('playerMeta').innerHTML = `${year || 'TV'} • Episode ${episode}`;
    document.getElementById('playerSection').classList.add('active');
    playerSection.scrollIntoView({ behavior: 'smooth' });
    updateProgress('tv', tmdbId, showTitle, '', year, resumeSec, season, episode);
    setupProgressTracker('tv', tmdbId, showTitle, '', year, season, episode);
  }
  
  function playLiveStream() {
    document.getElementById('playerFrame').src = LIVESTREAM_URL;
    document.getElementById('playerTitle').innerHTML = '🏁 Sky Sports F1 Racing Live';
    document.getElementById('playerMeta').innerHTML = 'Live Stream • Real-time racing';
    document.getElementById('playerSection').classList.add('active');
    clearProgressInterval();
    if(document.getElementById('customSaveBtn')) document.getElementById('customSaveBtn')?.remove();
    playerSection.scrollIntoView({ behavior: 'smooth' });
  }
  
  window.closePlayer = function() {
    clearProgressInterval();
    document.getElementById('playerFrame').src = '';
    document.getElementById('playerSection').classList.remove('active');
    if(document.getElementById('customSaveBtn')) document.getElementById('customSaveBtn')?.remove();
  };
  document.getElementById('closePlayerBtn').addEventListener('click', closePlayer);
  
  // ----- TMDB fetch movies/shows by search & categories (top rated)-----
  async function fetchTopRated(type, page=1) {
    const endpoint = type === 'movies' ? '/movie/top_rated' : '/tv/top_rated';
    const res = await fetch(`${TMDB_API}${endpoint}?api_key=${TMDB_KEY}&page=${page}`);
    const data = await res.json();
    return data.results || [];
  }
  
  async function searchGlobal(query, type) {
    if(type === 'live') return [];
    const mediaType = type === 'movies' ? 'movie' : 'tv';
    const res = await fetch(`${TMDB_API}/search/${mediaType}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&include_adult=false`);
    const data = await res.json();
    return data.results || [];
  }
  
  async function renderContent() {
    const dynamicDiv = document.getElementById('dynamicContent');
    const spinnerDiv = document.getElementById('spinner');
    const noResults = document.getElementById('noResultsMsg');
    dynamicDiv.innerHTML = '';
    noResults.style.display = 'none';
    spinnerDiv.classList.add('active');
    try {
      let items = [];
      if(currentTab === 'live') {
        spinnerDiv.classList.remove('active');
        dynamicDiv.innerHTML = `
          <div class="section-title">🏁 Live Racing Stream</div>
          <div class="card" id="liveCard" style="max-width:400px; margin-bottom:30px; cursor:pointer;">
            <div style="background:#000; padding:40px; text-align:center; border-radius:20px;">🔴 LIVE NOW: SKY SPORTS F1</div>
            <div class="card-info">Sky F1 Racing | High Quality 1080p</div>
          </div>
        `;
        document.getElementById('liveCard')?.addEventListener('click', () => playLiveStream());
        return;
      }
      const query = searchQuery.trim();
      let results = [];
      if(query !== '') {
        results = await searchGlobal(query, currentTab);
      } else {
        results = await fetchTopRated(currentTab);
      }
      if(results.length === 0) { noResults.style.display = ''; spinnerDiv.classList.remove('active'); return; }
      const grid = document.createElement('div');
      grid.className = 'grid-scroll';
      grid.innerHTML = results.map(item => {
        const title = currentTab === 'movies' ? item.title : item.name;
        const year = currentTab === 'movies' ? (item.release_date?.slice(0,4)||'') : (item.first_air_date?.slice(0,4)||'');
        const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
        const poster = item.poster_path ? IMG_BASE+item.poster_path : '';
        const tmdbId = item.id;
        const mediaType = currentTab;
        return `
          <div class="card" data-id="${tmdbId}" data-title="${escapeAttr(title)}" data-year="${escapeAttr(year)}" data-rating="${rating}" data-poster="${escapeAttr(poster)}">
            ${rating ? `<div class="rating">★ ${rating}</div>` : ''}
            <img class="poster" src="${poster || 'https://via.placeholder.com/300x450?text=No+Poster'}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
            <div class="card-info"><div class="card-title">${escapeHTML(title)}</div><div class="card-year">${year}</div></div>
          </div>
        `;
      }).join('');
      dynamicDiv.appendChild(grid);
      document.querySelectorAll('.card[data-id]').forEach(card => {
        card.addEventListener('click', (e) => {
          const id = card.dataset.id;
          const title = card.dataset.title;
          const year = card.dataset.year;
          const rating = card.dataset.rating;
          if(currentTab === 'movies') {
            playMovie(id, title, year, rating);
          } else if(currentTab === 'tv') {
            // ask season/episode? default to season 1 episode 1 prompt
            let season = prompt('Enter season number (1-...)', '1');
            let episode = prompt('Enter episode number', '1');
            if(season && episode) {
              playTvEpisode(id, parseInt(season), parseInt(episode), title, year);
            }
          }
        });
      });
      spinnerDiv.classList.remove('active');
    } catch(err) { console.error(err); spinnerDiv.classList.remove('active'); noResults.style.display = ''; }
  }
  
  // ----- Tab & search event bindings -----
  function setActiveTab(tab) {
    currentTab = tab;
    searchQuery = '';
    document.getElementById('globalSearch').value = '';
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if(btn.dataset.tab === tab) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    renderContent();
  }
  
  document.getElementById('globalSearch').addEventListener('input', (e) => {
    if(currentTab === 'live') return;
    searchQuery = e.target.value;
    renderContent();
  });
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
  });
  
  // initialize
  loadContinueWatching();
  setActiveTab('movies');
  window.playMovie = playMovie;
  window.playTvEpisode = playTvEpisode;
  window.playLiveStream = playLiveStream;
</script>
</body>
</html>
