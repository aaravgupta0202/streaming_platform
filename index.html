<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>StreamVault | Cinema Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-elevated: #1a1a28;
    --border: #28283a;
    --text: #ededf0;
    --text-dim: #8a8a9e;
    --accent: #e44040;
    --accent-glow: rgba(228,64,64,0.3);
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* header */
  header {
    padding: 18px 30px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(18px);
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .tabs {
    display: flex;
    gap: 8px;
    background: var(--surface);
    padding: 5px;
    border-radius: 60px;
  }

  .tab-btn {
    background: transparent;
    border: none;
    padding: 8px 22px;
    font-weight: 600;
    border-radius: 40px;
    color: var(--text-dim);
    cursor: pointer;
    transition: 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: white;
  }

  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 12px 20px 12px 46px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 48px;
    color: var(--text);
    font-size: 14px;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 24px 70px;
  }

  /* fullscreen player overlay */
  .player-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 10000;
    display: none;
    flex-direction: column;
    animation: fadeIn 0.3s ease;
  }

  .player-overlay.active {
    display: flex;
  }

  .player-nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 30px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .back-btn {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    transition: 0.2s;
  }

  .back-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .player-frame-wrapper {
    flex: 1;
    position: relative;
  }

  .player-frame-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* modal popup (Netflix style) */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    z-index: 5000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 40px;
    overflow-y: auto;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-container {
    max-width: 950px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    background: var(--surface-elevated);
    border-radius: 24px;
    border: 1px solid var(--border);
    position: relative;
    animation: modalPop 0.25s ease;
  }

  @keyframes modalPop {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-hero {
    position: relative;
    height: 380px;
    background-size: cover;
    background-position: center 20%;
    border-radius: 24px 24px 0 0;
  }

  .modal-hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to top, var(--surface-elevated), transparent);
  }

  .modal-content {
    padding: 24px 32px 32px;
  }

  .modal-title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .modal-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .rating-badge {
    background: #ffcd4a;
    color: #1e1e2a;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
  }

  .genres {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .genre-tag {
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
  }

  .description {
    line-height: 1.6;
    margin-bottom: 24px;
    color: #ddd;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
    background: rgba(0,0,0,0.3);
    padding: 16px;
    border-radius: 16px;
  }

  .info-item strong {
    color: var(--accent);
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
  }

  .seasons-dropdown {
    margin: 20px 0 16px;
  }

  .season-select {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    width: 200px;
    cursor: pointer;
  }

  .episodes-grid {
    display: grid;
    gap: 16px;
    margin-top: 16px;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .episode-card {
    display: flex;
    gap: 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid transparent;
  }

  .episode-card:hover {
    border-color: var(--accent);
    background: rgba(228,64,64,0.1);
    transform: translateX(4px);
  }

  .episode-img {
    width: 120px;
    height: 68px;
    object-fit: cover;
    border-radius: 8px;
  }

  .episode-info {
    flex: 1;
  }

  .episode-title {
    font-weight: 600;
    margin-bottom: 6px;
  }

  .episode-desc {
    font-size: 13px;
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 24px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  /* cards grid */
  .grid-scroll {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
  }

  .poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
  }

  .card-info {
    padding: 12px;
  }

  .card-title {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spinner {
    text-align: center;
    padding: 60px;
    display: none;
  }

  .spinner.active {
    display: block;
  }

  .spinner::after {
    content: '';
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 700px) {
    .modal-container { max-width: 95%; }
    .modal-hero { height: 260px; }
    .modal-title { font-size: 24px; }
    .episode-card { flex-direction: column; }
    .episode-img { width: 100%; height: auto; aspect-ratio: 16/9; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" width="20" height="20"><polygon points="5,3 19,12 5,21" fill="white"/></svg></div>
    StreamVault
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="movie">🎬 Movies</button>
    <button class="tab-btn" data-tab="tv">📺 TV Shows</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; left:18px; top:50%; transform:translateY(-50%);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search movies or TV shows..." autocomplete="off">
  </div>
</header>

<main>
  <div id="dynamicContent"></div>
  <div id="spinner" class="spinner"></div>
</main>

<!-- Netflix Modal Preview -->
<div id="detailModal" class="modal-overlay">
  <div class="modal-container">
    <button class="close-modal" id="closeModalBtn">✕</button>
    <div id="modalHero" class="modal-hero"></div>
    <div class="modal-content">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalMeta" class="modal-meta"></div>
      <div id="modalGenres" class="genres"></div>
      <div id="modalDesc" class="description"></div>
      <div id="modalInfo" class="info-grid"></div>
      <div id="seasonsContainer" style="display: none;">
        <div class="seasons-dropdown">
          <select id="seasonSelect" class="season-select"></select>
        </div>
        <div id="episodesList" class="episodes-grid"></div>
      </div>
      <button id="playNowBtn" class="back-btn" style="background: var(--accent); margin-top: 16px; width: 100%; padding: 14px;">▶ Play Now</button>
    </div>
  </div>
</div>

<!-- Fullscreen Player Overlay -->
<div id="playerOverlay" class="player-overlay">
  <div class="player-nav">
    <button class="back-btn" id="exitPlayerBtn">← Back to Browse</button>
  </div>
  <div class="player-frame-wrapper">
    <iframe id="fullscreenPlayer" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  </div>
</div>

<script>
  // ---- CONFIG ----
  const TMDB_API = 'https://api.themoviedb.org/3';
  const TMDB_KEY = '8f8c7b0e8aefce789115fc66fd672df1';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  const BACKDROP_BASE = 'https://image.tmdb.org/t/p/original';
  const VIDAPI_MOVIE = 'https://vidapi.qzz.io/movie/';
  const VIDAPI_TV = 'https://vidapi.qzz.io/tv/';
  
  // IMDbAPI fallback for extra details (actors, directors, etc.)
  const IMDBAPI_URL = 'https://api.imdbapi.dev/v1';
  
  let currentTab = 'movie';
  let searchQuery = '';
  let currentTitleData = null; // holds full TMDB + enriched data
  let currentShowSeasonsEpisodes = null;
  
  // ----- Helper Functions -----
  async function fetchFromTMDB(endpoint) {
    const res = await fetch(`${TMDB_API}${endpoint}?api_key=${TMDB_KEY}`);
    if(!res.ok) throw new Error('TMDB error');
    return res.json();
  }
  
  async function fetchIMDbDetails(imdbId) {
    try {
      const res = await fetch(`${IMDBAPI_URL}/title/${imdbId}?info=base_info&info=actors_info&info=directors_info&info=writers_info`);
      if(res.ok) return await res.json();
    } catch(e) { console.warn('IMDbAPI optional'); }
    return null;
  }
  
  async function getTitleDetails(tmdbId, type) {
    const endpoint = type === 'movie' ? `/movie/${tmdbId}` : `/tv/${tmdbId}`;
    const data = await fetchFromTMDB(endpoint);
    // enrich with external ids for IMDb
    const external = await fetchFromTMDB(`${endpoint}/external_ids`);
    let imdbRich = null;
    if(external.imdb_id) imdbRich = await fetchIMDbDetails(external.imdb_id);
    
    let actors = [], directors = [], writers = [], languages = [];
    if(imdbRich && imdbRich.data) {
      actors = (imdbRich.data.actors || []).slice(0,5).map(a => a.name);
      directors = (imdbRich.data.directors || []).slice(0,3).map(d => d.name);
      writers = (imdbRich.data.writers || []).slice(0,3).map(w => w.name);
      languages = (imdbRich.data.languages || []);
    } else {
      // fallback credits
      const credits = await fetchFromTMDB(`${endpoint}/credits`);
      actors = credits.cast?.slice(0,5).map(c => c.name) || [];
      directors = credits.crew?.filter(c => c.job === 'Director').map(c => c.name) || [];
    }
    
    return {
      ...data,
      actors,
      directors,
      writers,
      languages: languages.length ? languages : (data.spoken_languages?.map(l => l.english_name) || []),
      poster: data.poster_path ? IMG_BASE + data.poster_path : '',
      backdrop: data.backdrop_path ? BACKDROP_BASE + data.backdrop_path : '',
    };
  }
  
  async function getTVSeasons(tmdbId, totalSeasons) {
    const seasonsData = [];
    for(let s=1; s<=totalSeasons && s<=8; s++) { // limit to 8 seasons for performance
      try {
        const seasonInfo = await fetchFromTMDB(`/tv/${tmdbId}/season/${s}`);
        seasonsData.push({
          season_number: s,
          episodes: seasonInfo.episodes.map(ep => ({
            id: ep.id,
            episode_number: ep.episode_number,
            title: ep.name,
            overview: ep.overview || 'No description',
            still_path: ep.still_path ? IMG_BASE + ep.still_path : null,
            runtime: ep.runtime,
            air_date: ep.air_date
          }))
        });
      } catch(e) { break; }
    }
    return seasonsData;
  }
  
  // ----- UI: Render card grid -----
  async function renderContent() {
    const container = document.getElementById('dynamicContent');
    const spinner = document.getElementById('spinner');
    spinner.classList.add('active');
    container.innerHTML = '';
    try {
      let results = [];
      if(searchQuery.trim()) {
        const endpoint = currentTab === 'movie' ? '/search/movie' : '/search/tv';
        const res = await fetch(`${TMDB_API}${endpoint}?api_key=${TMDB_KEY}&query=${encodeURIComponent(searchQuery)}`);
        const data = await res.json();
        results = data.results || [];
      } else {
        const endpoint = currentTab === 'movie' ? '/movie/top_rated' : '/tv/top_rated';
        const data = await fetchFromTMDB(endpoint);
        results = data.results || [];
      }
      if(results.length === 0) {
        container.innerHTML = '<div class="state-message" style="text-align:center;padding:80px;">🎬 No titles found</div>';
        spinner.classList.remove('active');
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'grid-scroll';
      grid.innerHTML = results.map(item => {
        const title = currentTab === 'movie' ? item.title : item.name;
        const poster = item.poster_path ? IMG_BASE+item.poster_path : '';
        const year = currentTab === 'movie' ? (item.release_date?.slice(0,4)||'') : (item.first_air_date?.slice(0,4)||'');
        const rating = item.vote_average?.toFixed(1) || '';
        return `
          <div class="card" data-id="${item.id}" data-type="${currentTab}" data-title="${escapeAttr(title)}">
            ${rating ? `<div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); padding:4px 8px; border-radius:20px; font-size:12px;">★ ${rating}</div>` : ''}
            <img class="poster" src="${poster || 'https://via.placeholder.com/300x450?text=No+Poster'}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Poster'">
            <div class="card-info">
              <div class="card-title">${escapeHTML(title)}</div>
              <div style="font-size:12px; color:#aaa;">${year}</div>
            </div>
          </div>
        `;
      }).join('');
      container.appendChild(grid);
      
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', async (e) => {
          const id = parseInt(card.dataset.id);
          const type = card.dataset.type;
          await showDetailModal(id, type);
        });
      });
    } catch(err) { console.error(err); container.innerHTML = '<div class="state-message">Error loading data</div>'; }
    finally { spinner.classList.remove('active'); }
  }
  
  // ----- Netflix Modal with Seasons/Episodes -----
  async function showDetailModal(tmdbId, type) {
    const modal = document.getElementById('detailModal');
    const heroDiv = document.getElementById('modalHero');
    const titleSpan = document.getElementById('modalTitle');
    const metaDiv = document.getElementById('modalMeta');
    const genresDiv = document.getElementById('modalGenres');
    const descDiv = document.getElementById('modalDesc');
    const infoGrid = document.getElementById('modalInfo');
    const seasonsContainer = document.getElementById('seasonsContainer');
    const playBtn = document.getElementById('playNowBtn');
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    try {
      const details = await getTitleDetails(tmdbId, type);
      currentTitleData = { ...details, type, tmdbId };
      heroDiv.style.backgroundImage = `url(${details.backdrop || details.poster})`;
      heroDiv.style.backgroundSize = 'cover';
      titleSpan.innerText = type === 'movie' ? details.title : details.name;
      const year = type === 'movie' ? (details.release_date?.slice(0,4)||'') : (details.first_air_date?.slice(0,4)||'');
      const rating = details.vote_average?.toFixed(1);
      metaDiv.innerHTML = `
        <span>${year}</span>
        <span>${details.runtime ? details.runtime+' min' : ''}</span>
        ${rating ? `<span class="rating-badge">★ ${rating}</span>` : ''}
        <span>${type === 'movie' ? 'Movie' : 'TV Series'}</span>
      `;
      genresDiv.innerHTML = (details.genres || []).map(g => `<span class="genre-tag">${g.name}</span>`).join('');
      descDiv.innerText = details.overview || 'No description available.';
      
      let actorsStr = details.actors?.slice(0,5).join(', ') || 'N/A';
      let directorsStr = details.directors?.join(', ') || 'N/A';
      let languageStr = details.languages?.slice(0,3).join(', ') || 'English';
      infoGrid.innerHTML = `
        <div class="info-item"><strong>Cast</strong> ${actorsStr}</div>
        <div class="info-item"><strong>Directors</strong> ${directorsStr}</div>
        <div class="info-item"><strong>Language</strong> ${languageStr}</div>
        <div class="info-item"><strong>Writers</strong> ${details.writers?.slice(0,3).join(', ') || 'N/A'}</div>
      `;
      
      if(type === 'tv') {
        seasonsContainer.style.display = 'block';
        const totalSeasons = details.number_of_seasons || 1;
        const seasonsEpData = await getTVSeasons(tmdbId, totalSeasons);
        currentShowSeasonsEpisodes = seasonsEpData;
        populateSeasonDropdown(seasonsEpData);
      } else {
        seasonsContainer.style.display = 'none';
      }
      
      playBtn.onclick = () => {
        if(type === 'movie') {
          openFullscreenPlayer('movie', tmdbId, details.title || details.name);
        } else {
          // default play season1 episode1
          openFullscreenPlayer('tv', tmdbId, details.name, 1, 1);
        }
        modal.classList.remove('active');
        document.body.style.overflow = '';
      };
      
    } catch(err) { console.error(err); alert('Could not load details'); closeModal(); }
  }
  
  function populateSeasonDropdown(seasonsData) {
    const select = document.getElementById('seasonSelect');
    const episodesDiv = document.getElementById('episodesList');
    select.innerHTML = '';
    if(!seasonsData.length) return;
    seasonsData.forEach(season => {
      const option = document.createElement('option');
      option.value = season.season_number;
      option.textContent = `Season ${season.season_number}`;
      select.appendChild(option);
    });
    function loadEpisodes(seasonNum) {
      const season = seasonsData.find(s => s.season_number == seasonNum);
      if(!season) return;
      episodesDiv.innerHTML = season.episodes.map(ep => `
        <div class="episode-card" data-season="${seasonNum}" data-epnum="${ep.episode_number}" data-ep-title="${escapeAttr(ep.title)}">
          ${ep.still_path ? `<img class="episode-img" src="${ep.still_path}" onerror="this.style.display='none'">` : `<div class="episode-img" style="background:#2a2a3a; display:flex; align-items:center; justify-content:center;">📺</div>`}
          <div class="episode-info">
            <div class="episode-title">${ep.episode_number}. ${escapeHTML(ep.title)}</div>
            <div class="episode-desc">${escapeHTML(ep.overview?.slice(0,120) || 'No description')}</div>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.episode-card').forEach(card => {
        card.addEventListener('click', () => {
          const season = parseInt(card.dataset.season);
          const epNum = parseInt(card.dataset.epnum);
          const showTitle = currentTitleData.name;
          openFullscreenPlayer('tv', currentTitleData.tmdbId, showTitle, season, epNum);
          closeModal();
        });
      });
    }
    loadEpisodes(seasonsData[0].season_number);
    select.onchange = (e) => loadEpisodes(parseInt(e.target.value));
  }
  
  function openFullscreenPlayer(type, id, title, season = null, episode = null) {
    const overlay = document.getElementById('playerOverlay');
    const iframe = document.getElementById('fullscreenPlayer');
    let url = '';
    if(type === 'movie') {
      url = `${VIDAPI_MOVIE}${id}?autoplay=true&primarycolor=E44040&secondarycolor=2A151F&icons=netflix&title=true`;
    } else {
      url = `${VIDAPI_TV}${id}/${season}/${episode}?autoplay=true&primarycolor=E44040&secondarycolor=2A151F&icons=netflix&title=true`;
    }
    iframe.src = url;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  
  function closePlayer() {
    const overlay = document.getElementById('playerOverlay');
    const iframe = document.getElementById('fullscreenPlayer');
    iframe.src = '';
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  function closeModal() {
    const modal = document.getElementById('detailModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
    currentTitleData = null;
  }
  
  // ---- Event binding ----
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('exitPlayerBtn').addEventListener('click', closePlayer);
  document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if(e.target === document.getElementById('detailModal')) closeModal(); });
  
  function escapeHTML(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escapeAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'\\"'); }
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      renderContent();
    });
  });
  
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderContent();
  });
  
  renderContent();
</script>
</body>
</html>
